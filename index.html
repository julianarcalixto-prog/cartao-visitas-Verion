<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vérion Consultoria Estratégica</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: radial-gradient(circle at top, #2b1b12, #0d0704);
  color: #fff;
}

.container {
  display: flex;
  min-height: 100vh;
}

/* LADO ESQUERDO */
.left {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.left img {
  max-width: 340px;
}

/* LADO DIREITO */
.right {
  width: 420px;
  padding: 40px 30px;
  background: linear-gradient(180deg, #120a06, #1c120c);
  border-left: 1px solid rgba(255, 215, 160, 0.15);
}

/* NOME */
.name {
  font-size: 28px;
  margin-bottom: 5px;
}

.role {
  color: #c9a56a;
  margin-bottom: 25px;
}

/* CONTATO */
.item {
  margin-bottom: 20px;
}

.label {
  font-size: 13px;
  color: #c9a56a;
}

.value {
  font-size: 16px;
}

/* QR */
.qr {
  text-align: center;
  margin: 30px 0;
}

.qr img {
  width: 140px;
  background: #fff;
  padding: 8px;
  border-radius: 10px;
}

/* BOTÕES */
.btn {
  display: block;
  text-align: center;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: bold;
}

.btn-whats {
  background: linear-gradient(#caa45f, #9c7738);
  color: #000;
}

.btn-outline {
  border: 1px solid #caa45f;
  color: #fff;
}
</style>
</head>

<body>

<div class="container">

  <!-- ESQUERDA (LOGO) -->
  <div class="left">
    <img src="assets/logo.png">
  </div>

  <!-- DIREITA (INFORMAÇÕES) -->
  <div class="right">

    <div class="name">Juliana Rachid Calixto</div>
    <div class="role">Especialista em Estratégia Regulatória</div>

    <div class="item">
      <div class="label">Telefone / WhatsApp</div>
      <div class="value">19 98945-7404</div>
    </div>

    <div class="item">
      <div class="label">E-mail</div>
      <div class="value">juliana@verionconsultoria.com.br</div>
    </div>

    <div class="item">
      <div class="label">Site</div>
      <div class="value">www.verionconsultoria.com.br</div>
    </div>

    <div class="item">
      <div class="label">Localização</div>
      <div class="value">Campinas, SP - Brasil</div>
    </div>

    <div class="qr">
      <img src="assets/qrcode.png">
      <div style="font-size:12px; color:#c9a56a; margin-top:10px;">
        Escaneie para salvar contato
      </div>
    </div>

    <a class="btn btn-whats" href="https://wa.me/5519989457404" target="_blank">
      FALAR NO WHATSAPP
    </a>

    <a class="btn btn-outline" href="mailto:juliana@verionconsultoria.com.br">
      ENVIAR E-MAIL
    </a>

    <a class="btn btn-outline" href="https://www.verionconsultoria.com.br" target="_blank">
      ACESSAR SITE
    </a>

  </div>

</div>

</body>
</html>
